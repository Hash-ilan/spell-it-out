<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Spell It Out!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#0f0520 0%,#2d0a5e 40%,#6b0f6b 70%,#7c2d00 100%);color:#fff;overflow-x:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;animation:tw 2s infinite alternate}
@keyframes tw{from{opacity:0.2;transform:scale(0.7)}to{opacity:0.9;transform:scale(1.3)}}
.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:1.2rem 1rem}
.card{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:16px;padding:1.25rem;margin-bottom:12px}
.btn{padding:10px 20px;border-radius:12px;border:none;cursor:pointer;font-weight:600;font-size:14px;color:#fff;transition:opacity .2s}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-main{background:linear-gradient(135deg,#7c3aed,#db2777);font-size:16px;padding:14px;width:100%;margin-bottom:10px}
.btn-demo{background:rgba(253,230,138,0.15);border:1.5px solid #fde68a!important;color:#fde68a!important;font-size:14px;padding:12px;width:100%;margin-bottom:10px}
.btn-teacher{background:rgba(255,255,255,0.12);font-size:14px;padding:12px;width:100%;margin-bottom:10px}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-green{background:linear-gradient(135deg,#059669,#0ea5e9)}
.btn-red{background:#be123c}
.btn-ghost{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25)}
.inp{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:10px;color:#fff;padding:8px 12px;font-size:14px;width:100%;margin-bottom:8px}
.inp::placeholder{color:rgba(255,255,255,0.4)}
select.inp{cursor:pointer}
textarea.inp{resize:none;font-family:sans-serif;height:80px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;margin-right:4px;margin-bottom:4px}
.page{display:none}.page.active{display:block}
.board{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:14px}
.sq{border-radius:8px;min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.2)}
.sq .num{font-size:9px;opacity:0.8}
.sq .ico{font-size:15px}
.sq.glow{box-shadow:0 0 0 2px #fde68a}
.players{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.player-tag{padding:5px 12px;border-radius:20px;font-size:13px;border:2px solid transparent;background:rgba(255,255,255,0.06)}
.player-tag.active{font-weight:700}
.dice-val{background:rgba(253,230,138,0.2);border:2px solid #fde68a;padding:4px 16px;border-radius:10px;font-weight:700;font-size:24px;color:#fde68a;margin-left:auto}
.ref-num{font-size:36px;font-weight:700;color:#fb923c}
.fb-box{background:rgba(5,150,105,0.2);border:1px solid #059669;border-radius:12px;padding:12px 16px;margin-bottom:16px;color:#d1fae5;font-size:14px}
.type-badge{padding:3px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-bottom:10px;border:1px solid rgba(255,255,255,0.3)}
.hidden{display:none}
h1{font-size:26px;font-weight:700;color:#fde68a;text-shadow:0 2px 12px rgba(0,0,0,0.5)}
h2{font-size:20px;font-weight:600;color:#fde68a;margin-bottom:16px}
.muted{color:#f0abfc;font-size:13px}
.err{color:#fca5a5;font-size:13px;margin-bottom:8px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.back{background:none;border:none;color:#f0abfc;cursor:pointer;font-size:14px}
.q-text{color:#fde68a;font-weight:700;font-size:16px;margin-bottom:14px}
.home-center{text-align:center;padding-top:2rem}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:20px}
.spin{display:inline-block;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.q-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.q-item{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 12px;margin-bottom:8px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- HOME -->
<div class="page active" id="page-home">
<div class="wrap home-center">
  <div style="font-size:56px;margin-bottom:8px">🔮</div>
  <h1>Spell It Out!</h1>
  <p style="color:#f0abfc;font-size:15px;margin:6px 0 28px">The magical English speaking board game</p>
  <div style="max-width:300px;margin:0 auto">
    <button class="btn btn-main" onclick="go('setup',false)">🎮 Play game</button>
    <button class="btn btn-demo" onclick="go('setup',true)">🧪 Demo mode (no mic needed)</button>
    <button class="btn btn-teacher" onclick="go('teacherLogin')">🔐 Teacher setup</button>
  </div>
  <div class="tag-row" id="type-tags"></div>
</div>
</div>

<!-- TEACHER LOGIN -->
<div class="page" id="page-teacherLogin">
<div class="wrap" style="max-width:380px">
  <button class="back" onclick="go('home')">← Back</button>
  <div class="card" style="text-align:center;margin-top:1rem">
    <div style="font-size:36px;margin-bottom:8px">🔐</div>
    <h2>Teacher login</h2>
    <input class="inp" type="password" id="pass-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPass()"/>
    <p class="err hidden" id="pass-err">Wrong password — try again.</p>
    <button class="btn btn-main" style="margin-top:8px" onclick="checkPass()">Enter ✨</button>
  </div>
</div>
</div>

<!-- TEACHER -->
<div class="page" id="page-teacher">
<div class="wrap" style="max-width:580px">
  <button class="back" onclick="go('home')">← Back</button>
  <h2 style="margin-top:8px">📖 Spellbook — Teacher Setup</h2>
  <div id="games-list"></div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <input class="inp" id="new-game-name" placeholder="New game name…" style="margin:0;flex:1"/>
    <button class="btn btn-sm" style="background:#7c3aed" onclick="addGame()">+ Add</button>
  </div>
  <div id="edit-game" class="hidden" style="margin-top:16px">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <input class="inp" id="edit-game-name" style="margin:0;flex:1;font-weight:600;font-size:16px"/>
      <button class="btn btn-sm btn-green" onclick="saveGame()">Save ✓</button>
      <button class="btn btn-sm btn-ghost" onclick="cancelEdit()">Cancel</button>
    </div>
    <div id="questions-list"></div>
    <button class="btn btn-sm btn-ghost" style="margin-bottom:12px" onclick="addQ()">+ Add question</button>
    <div class="card">
      <p style="font-weight:600;font-size:13px;margin-bottom:8px;color:#fde68a">📋 Import from JSON:</p>
      <textarea class="inp" id="json-input" style="height:70px;font-family:monospace;font-size:12px" placeholder='[{"text":"Your question?","type":"question","reflection":5}]'></textarea>
      <p class="err hidden" id="json-err"></p>
      <button class="btn btn-sm btn-ghost" onclick="importJSON()">Import & replace questions</button>
    </div>
  </div>
</div>
</div>

<!-- SETUP -->
<div class="page" id="page-setup">
<div class="wrap" style="max-width:480px">
  <button class="back" onclick="go('home')">← Back</button>
  <h2 style="margin-top:8px">🧙 Choose your quest</h2>
  <p class="muted" style="margin-bottom:8px">Select a game:</p>
  <div id="game-select"></div>
  <p class="muted" style="margin:14px 0 8px">Number of players:</p>
  <div style="display:flex;gap:8px;margin-bottom:14px" id="num-players"></div>
  <p class="muted" style="margin-bottom:8px">Player names:</p>
  <div id="player-names"></div>
  <button class="btn btn-main" style="margin-top:12px;width:auto;padding:14px 28px" onclick="startGame()" id="start-btn">Cast the spell — start! ✨</button>
  <p class="err hidden" id="setup-err">Add questions in Teacher Setup first.</p>
</div>
</div>

<!-- GAME -->
<div class="page" id="page-game">
<div class="wrap">
  <div class="top-bar">
    <button class="back" onclick="go('home')">← Exit</button>
    <span class="muted" id="game-label"></span>
  </div>
  <div class="players" id="players-bar"></div>
  <div class="board" id="board"></div>
  <div class="card" id="action-panel"></div>
</div>
</div>

<!-- WINNER -->
<div class="page" id="page-winner">
<div class="wrap" style="text-align:center;padding-top:4rem">
  <div style="font-size:72px">🏆</div>
  <h1 style="margin:12px 0 8px" id="winner-name"></h1>
  <p style="color:#f0abfc;font-size:16px;margin-bottom:32px">The spell has been cast! 🌟</p>
  <button class="btn" style="background:linear-gradient(135deg,#7c3aed,#db2777);padding:14px 28px;font-size:15px" onclick="go('setup')">Play again ✨</button>
</div>
</div>

<script>
const PASS = "Fifilorna@889";
const BOARD_SIZE = 24;
const P_COLORS = ["#a855f7","#ec4899","#0ea5e9","#10b981"];
const P_ICONS = ["🧙‍♀️","🧝","🧛","🧜"];
const TYPE_META = {
  question:{bg:"rgba(124,58,237,0.35)",border:"#7c3aed",label:"Question",icon:"🔮"},
  sentence: {bg:"rgba(217,119,6,0.35)", border:"#d97706",label:"Complete",icon:"✨"},
  story:    {bg:"rgba(5,150,105,0.35)", border:"#059669",label:"Story",   icon:"📖"},
  bonus:    {bg:"rgba(219,39,119,0.35)",border:"#db2777",label:"Bonus!",  icon:"⭐"},
  skip:     {bg:"rgba(107,114,128,0.35)",border:"#6b7280",label:"Skip",   icon:"💨"},
  start:    {bg:"rgba(22,163,74,0.35)", border:"#16a34a",label:"Start",   icon:"🏠"},
  finish:   {bg:"rgba(234,88,12,0.35)", border:"#ea580c",label:"Finish",  icon:"🏆"},
};
const DEMO_ANSWERS = [
  "Last weekend I went to the cinema with friends and watched a fascinating film about space exploration.",
  "I would love to live in a big house near the sea with a beautiful garden and lots of natural light.",
  "Every morning I usually wake up at seven, have a shower, and eat breakfast before going to work.",
  "Once I was late for an important exam because my alarm didn't go off and I had to run to catch the bus.",
  "I really enjoy spending Sundays reading books at home or taking long walks in the park near my house.",
];
const DEFAULT_QS = [
  {text:"What did you do last weekend?",type:"question",reflection:5},
  {text:"Describe your ideal home.",type:"question",reflection:8},
  {text:"Every morning I usually…",type:"sentence",reflection:5},
  {text:"Tell a short story about a time you were late.",type:"story",reflection:10},
  {text:"What is your favourite way to spend a Sunday?",type:"question",reflection:5},
  {text:"If I had more free time, I would…",type:"sentence",reflection:5},
  {text:"Describe your neighbourhood.",type:"question",reflection:8},
  {text:"Tell a short story about a funny thing that happened to you.",type:"story",reflection:12},
  {text:"The best meal I ever had was…",type:"sentence",reflection:5},
  {text:"What would you change about your daily routine?",type:"question",reflection:8},
];

let games = [{id:1,name:"Daily Life",questions:DEFAULT_QS.map(q=>({...q}))}];
let selGameId = null;
let numP = 2;
let names = ["Player 1","Player 2","Player 3","Player 4"];
let board = [];
let pos = [0,0,0,0];
let cp = 0;
let dice = null;
let phase = "roll";
let curQ = null;
let timerVal = 0;
let timerInt = null;
let answer = "";
let demoMode = false;
let editingId = null;
let editingGame = null;
let recog = null;

function makeBoard(qs){
  return Array.from({length:BOARD_SIZE},(_,i)=>{
    if(i===0) return {type:"start"};
    if(i===BOARD_SIZE-1) return {type:"finish"};
    if(i%6===0) return {type:"bonus"};
    if(i%9===0) return {type:"skip"};
    const q=qs[(i-1)%qs.length];
    return {type:q.type,qi:(i-1)%qs.length};
  });
}

function go(page, demo){
  if(demo!==undefined) demoMode=!!demo;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(page==='home') renderHome();
  if(page==='setup') renderSetup();
  if(page==='teacher') renderTeacher();
}

function renderHome(){
  const t = document.getElementById('type-tags');
  t.innerHTML = Object.entries(TYPE_META).map(([k,v])=>
    `<span class="badge" style="background:${v.bg};border:1px solid ${v.border}">${v.icon} ${v.label}</span>`
  ).join('');
}

function checkPass(){
  const v = document.getElementById('pass-input').value;
  if(v===PASS){ document.getElementById('pass-err').classList.add('hidden'); go('teacher'); }
  else document.getElementById('pass-err').classList.remove('hidden');
}

function renderTeacher(){
  document.getElementById('edit-game').classList.add('hidden');
  const el = document.getElementById('games-list');
  el.innerHTML = games.map(g=>`
    <div class="card" style="display:flex;align-items:center;justify-content:space-between">
      <div><p style="font-weight:600;margin-bottom:2px">🎲 ${g.name}</p><p class="muted">${g.questions.length} questions</p></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-ghost" onclick="openEdit(${g.id})">Edit</button>
        <button class="btn btn-sm btn-red" onclick="deleteGame(${g.id})">Delete</button>
      </div>
    </div>`).join('');
}

function addGame(){
  const n=document.getElementById('new-game-name').value.trim();
  if(!n) return;
  games.push({id:Date.now(),name:n,questions:[]});
  document.getElementById('new-game-name').value='';
  renderTeacher();
}

function deleteGame(id){ games=games.filter(g=>g.id!==id); renderTeacher(); }

function openEdit(id){
  editingId=id;
  editingGame=JSON.parse(JSON.stringify(games.find(g=>g.id===id)));
  document.getElementById('edit-game-name').value=editingGame.name;
  document.getElementById('edit-game').classList.remove('hidden');
  renderQList();
}

function renderQList(){
  const el=document.getElementById('questions-list');
  el.innerHTML=editingGame.questions.map((q,i)=>`
    <div class="q-item">
      <div class="q-row">
        <select class="inp" style="width:auto;padding:4px 8px;margin:0" onchange="updQType(${i},this.value)">
          <option value="question" ${q.type==='question'?'selected':''}>🔮 Question</option>
          <option value="sentence" ${q.type==='sentence'?'selected':''}>✨ Complete</option>
          <option value="story"    ${q.type==='story'?'selected':''}>📖 Story</option>
        </select>
        <span class="muted" style="display:flex;align-items:center;gap:4px">⏱
          <input class="inp" type="number" min="0" max="60" value="${q.reflection}" style="width:50px;margin:0;padding:4px 6px" onchange="updQRef(${i},this.value)"/>s
        </span>
        <button onclick="removeQ(${i})" style="margin-left:auto;background:none;border:none;color:#fca5a5;cursor:pointer">✕</button>
      </div>
      <input class="inp" style="margin:0" value="${q.text.replace(/"/g,'&quot;')}" oninput="updQText(${i},this.value)"/>
    </div>`).join('');
}

function updQType(i,v){editingGame.questions[i].type=v;}
function updQRef(i,v){editingGame.questions[i].reflection=parseInt(v)||0;}
function updQText(i,v){editingGame.questions[i].text=v;}
function addQ(){editingGame.questions.push({text:"New question…",type:"question",reflection:5});renderQList();}
function removeQ(i){editingGame.questions.splice(i,1);renderQList();}

function saveGame(){
  editingGame.name=document.getElementById('edit-game-name').value;
  games=games.map(g=>g.id===editingId?editingGame:g);
  editingId=null;editingGame=null;
  document.getElementById('edit-game').classList.add('hidden');
  renderTeacher();
}
function cancelEdit(){editingId=null;editingGame=null;document.getElementById('edit-game').classList.add('hidden');}

function importJSON(){
  const txt=document.getElementById('json-input').value;
  const err=document.getElementById('json-err');
  try{
    const p=JSON.parse(txt);
    if(!Array.isArray(p)) throw new Error("Must be a JSON array");
    editingGame.questions=p.map(q=>({text:q.text||"?",type:["question","sentence","story"].includes(q.type)?q.type:"question",reflection:Number(q.reflection)||5}));
    document.getElementById('json-input').value='';
    err.classList.add('hidden');
    renderQList();
  }catch(e){err.textContent="Invalid JSON: "+e.message;err.classList.remove('hidden');}
}

function renderSetup(){
  selGameId=selGameId||games[0]?.id;
  const gs=document.getElementById('game-select');
  gs.innerHTML=games.map(g=>`
    <button onclick="selectGame(${g.id})" id="gbtn-${g.id}" class="btn" style="display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;border-radius:14px;border:${selGameId===g.id?'2px solid #fde68a':'1px solid rgba(255,255,255,0.2)'};background:${selGameId===g.id?'rgba(253,230,138,0.15)':'rgba(255,255,255,0.08)'}">
      <p style="margin:0;font-weight:600">🎲 ${g.name}</p>
      <p style="margin:0;font-size:12px;color:#f0abfc">${g.questions.length} questions</p>
    </button>`).join('');
  const np=document.getElementById('num-players');
  np.innerHTML=[1,2,3,4].map(n=>`
    <button onclick="setNumP(${n})" class="btn" style="width:46px;height:46px;border-radius:12px;font-size:18px;font-weight:700;border:${numP===n?'2px solid #fde68a':'1px solid rgba(255,255,255,0.2)'};background:${numP===n?'rgba(253,230,138,0.2)':'rgba(255,255,255,0.08)'}">${n}</button>`).join('');
  renderPlayerNames();
}

function selectGame(id){selGameId=id;renderSetup();}
function setNumP(n){numP=n;renderSetup();}

function renderPlayerNames(){
  const el=document.getElementById('player-names');
  el.innerHTML=Array.from({length:numP},(_,i)=>`
    <input class="inp" value="${names[i]}" placeholder="Player ${i+1}" style="border-left:3px solid ${P_COLORS[i]}" oninput="names[${i}]=this.value"/>`).join('');
}

function startGame(){
  const g=games.find(x=>x.id===selGameId);
  const err=document.getElementById('setup-err');
  if(!g||g.questions.length===0){err.classList.remove('hidden');return;}
  err.classList.add('hidden');
  board=makeBoard(g.questions);
  pos=[0,0,0,0];cp=0;phase="roll";dice=null;curQ=null;answer="";
  document.getElementById('game-label').textContent="🔮 "+g.name;
  go('game');
  renderGame();
}

function renderGame(){
  renderPlayersBar();
  renderBoard();
  renderActionPanel();
}

function renderPlayersBar(){
  const el=document.getElementById('players-bar');
  el.innerHTML=Array.from({length:numP},(_,i)=>`
    <div class="player-tag ${i===cp?'active':''}" style="border-color:${i===cp?P_COLORS[i]:'transparent'};background:${i===cp?P_COLORS[i]+'33':'rgba(255,255,255,0.06)'}">
      ${P_ICONS[i]} ${names[i]}: ${pos[i]+1}/${BOARD_SIZE}
    </div>`).join('');
}

function renderBoard(){
  const el=document.getElementById('board');
  el.innerHTML=board.map((s,i)=>{
    const m=TYPE_META[s.type]||TYPE_META.question;
    const here=Array.from({length:numP}).map((_,pi)=>pos[pi]===i?P_ICONS[pi]:null).filter(Boolean);
    return `<div class="sq ${here.length?'glow':''}" style="background:${m.bg};border-color:${m.border}55">
      <span class="ico">${m.icon}</span>
      <span class="num">${i+1}</span>
      ${here.length?`<span style="font-size:11px">${here.join('')}</span>`:''}
    </div>`;
  }).join('');
}

function renderActionPanel(){
  const g=games.find(x=>x.id===selGameId);
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <span style="font-size:22px">${P_ICONS[cp]}</span>
    <span style="font-weight:700;font-size:15px">${names[cp]}'s turn</span>
    ${dice!==null?`<span class="dice-val">${dice}</span>`:''}
  </div>`;

  if(phase==="roll"){
    html+=`<button class="btn" style="background:linear-gradient(135deg,#7c3aed,#db2777);font-size:15px;padding:12px 28px" onclick="doRoll()">🎲 Roll the dice!</button>`;
  } else if(phase==="rolling"){
    html+=`<button class="btn" style="background:linear-gradient(135deg,#7c3aed,#db2777);font-size:15px;padding:12px 28px" disabled>🎲 Rolling…</button>`;
  } else if(phase==="bonus"){
    html+=`<p style="color:#fde68a;font-weight:700;margin-bottom:10px">⭐ Bonus! Roll again!</p>
    <button class="btn" style="background:linear-gradient(135deg,#ec4899,#f97316)" onclick="phase='roll';doRoll()">Roll again ✨</button>`;
  } else if(phase==="skip"){
    html+=`<p style="color:#d1d5db;font-weight:600;margin-bottom:10px">💨 Skip! Turn over.</p>
    <button class="btn btn-ghost" onclick="nextTurn()">Next player →</button>`;
  } else if(phase==="reflect"){
    html+=`<p class="muted" style="margin-bottom:6px">✨ Think about your answer…</p>
    <p class="q-text">${curQ.text}</p>
    <span class="ref-num" id="ref-num">${timerVal}</span><span class="muted" style="margin-left:8px">seconds</span>`;
  } else if(phase==="speak"){
    const m=TYPE_META[curQ.type]||TYPE_META.question;
    html+=`<span class="type-badge" style="background:${m.bg};border-color:${m.border}">${m.icon} ${m.label}</span>
    <p class="q-text">${curQ.text}</p>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn" id="mic-btn" style="background:linear-gradient(135deg,#7c3aed,#0ea5e9)" onclick="toggleMic()">🎤 Use mic</button>
      <button class="btn" style="background:rgba(253,230,138,0.15);border:1px solid #fde68a;color:#fde68a" onclick="demoAnswer()">🧪 Demo answer</button>
    </div>
    <p id="mic-err" class="err hidden"></p>
    <p class="muted" style="margin-bottom:6px">Type or edit your answer:</p>
    <textarea class="inp" id="answer-box" placeholder="Speak, use demo, or type your answer here…" oninput="answer=this.value" style="height:80px">${answer}</textarea>
    <div style="margin-top:8px">
      <button class="btn btn-green" onclick="getFeedback()" id="fb-btn">🔮 Get feedback</button>
    </div>`;
  } else if(phase==="feedback"){
    html+=`<p style="font-weight:600;margin-bottom:4px;font-size:14px">Your answer:</p>
    <p style="font-size:13px;font-style:italic;color:#f0abfc;margin-bottom:14px">${answer}</p>
    <div class="fb-box" id="fb-text">Loading…</div>
    <button class="btn" style="background:linear-gradient(135deg,#7c3aed,#db2777)" onclick="nextTurn()">Next player →</button>`;
  }
  document.getElementById('action-panel').innerHTML=html;
  if(phase==="feedback") document.getElementById('fb-text').textContent=window._feedback||"Loading…";
}

function doRoll(){
  phase="rolling"; renderActionPanel();
  let c=0;
  const iv=setInterval(()=>{
    dice=Math.random()<0.5?1:2;
    document.getElementById('action-panel').querySelector('.dice-val')&&(document.getElementById('action-panel').querySelector('.dice-val').textContent=dice);
    c++;
    if(c>8){
      clearInterval(iv);
      const v=Math.random()<0.5?1:2; dice=v;
      const np=Math.min(pos[cp]+v,BOARD_SIZE-1);
      pos[cp]=np;
      if(np>=BOARD_SIZE-1){document.getElementById('winner-name').textContent=names[cp]+" wins!";go('winner');return;}
      const sq=board[np];
      renderBoard();
      if(sq.type==="bonus"){phase="bonus";renderGame();return;}
      if(sq.type==="skip"){phase="skip";renderGame();return;}
      if(sq.type==="start"){nextTurn();return;}
      const g=games.find(x=>x.id===selGameId);
      curQ=g.questions[sq.qi??0];
      answer=""; window._feedback="";
      if(curQ.reflection>0){
        timerVal=curQ.reflection; phase="reflect"; renderGame();
        timerInt=setInterval(()=>{
          timerVal--;
          const el=document.getElementById('ref-num');
          if(el) el.textContent=timerVal;
          if(timerVal<=0){clearInterval(timerInt);phase="speak";renderGame();}
        },1000);
      } else {phase="speak";renderGame();}
    }
  },80);
}

function nextTurn(){
  cp=(cp+1)%numP; phase="roll"; dice=null; curQ=null; answer=""; window._feedback="";
  if(recog){try{recog.stop();}catch(e){} recog=null;}
  renderGame();
}

function toggleMic(){
  const btn=document.getElementById('mic-btn');
  const errEl=document.getElementById('mic-err');
  if(recog){recog.stop();recog=null;btn.textContent="🎤 Use mic";btn.style.background="linear-gradient(135deg,#7c3aed,#0ea5e9)";return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){errEl.textContent="Mic not supported — please type your answer below.";errEl.classList.remove('hidden');return;}
  try{
    recog=new SR();recog.lang="en-US";recog.continuous=false;recog.interimResults=true;
    recog.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join(" ");answer=t;const box=document.getElementById('answer-box');if(box)box.value=t;};
    recog.onerror=e=>{errEl.textContent="Mic error: "+e.error+" — please type below.";errEl.classList.remove('hidden');recog=null;btn.textContent="🎤 Use mic";};
    recog.onend=()=>{recog=null;if(btn){btn.textContent="🎤 Use mic";btn.style.background="linear-gradient(135deg,#7c3aed,#0ea5e9)";}};
    recog.start();
    btn.textContent="🔴 Stop";btn.style.background="#be123c";
    errEl.classList.add('hidden');
  }catch(e){errEl.textContent="Mic unavailable — please type below.";errEl.classList.remove('hidden');}
}

function demoAnswer(){
  const a=DEMO_ANSWERS[Math.floor(Math.random()*DEMO_ANSWERS.length)];
  answer="";let i=0;
  const box=document.getElementById('answer-box');
  const iv=setInterval(()=>{answer=a.slice(0,i+1);if(box)box.value=answer;i++;if(i>=a.length)clearInterval(iv);},25);
}

function getFeedback(){
  if(!answer.trim()) return;
  phase="feedback";
  const a=answer.trim();
  const words=a.split(/\s+/).length;
  const sentences=a.split(/[.!?]+/).filter(s=>s.trim().length>0).length;

  // Grammar checks
  const checks=[];
  if(/\bi am\b/i.test(a)&&!/\bi'm\b/i.test(a)) checks.push("Great use of 'I am' — you could also try the contraction 'I'm' to sound more natural.");
  if(/\bhe have\b|\bshe have\b|\bit have\b/i.test(a)) checks.push("Remember: with he/she/it, use 'has' instead of 'have'. For example: 'she has' not 'she have'.");
  if(/\bI has\b/i.test(a)) checks.push("Remember: with 'I', use 'have' not 'has'. For example: 'I have' is correct.");
  if(/\bmore better\b|\bmore faster\b|\bmore bigger\b/i.test(a)) checks.push("Watch out for double comparatives — 'more better' should just be 'better'.");
  if(/\bvery very\b/i.test(a)) checks.push("Instead of 'very very', try stronger adjectives like 'extremely' or 'incredibly' for variety.");
  if(/\bi go\b.*\byesterday\b|\bi see\b.*\byesterday\b|\bi eat\b.*\byesterday\b/i.test(a)) checks.push("When talking about the past, remember to use the past tense — 'I went', 'I saw', 'I ate'.");
  if(/\bdon't\b|\bcan't\b|\bwon't\b/i.test(a)) checks.push("Well done using contractions naturally — that makes your English sound more fluent!");
  if(/\bbecause\b/i.test(a)) checks.push("Excellent use of 'because' to explain your ideas — this makes your answer much more complete.");
  if(/\bhowever\b|\balthough\b|\bdespite\b|\bon the other hand\b/i.test(a)) checks.push("Fantastic! Using linking words like that really shows good B2-level English.");

  // Strengths based on length
  const strengths=[];
  if(words>=30) strengths.push("Your answer is very detailed and well-developed — excellent work!");
  else if(words>=15) strengths.push("Good answer with a solid amount of detail.");
  else strengths.push("You gave an answer — now try to add more detail next time to extend your response.");

  if(sentences>=2) strengths.push("You used more than one sentence, which shows good fluency.");

  // Vocabulary encouragement
  const goodWords=["furthermore","nevertheless","consequently","whereas","meanwhile","therefore","however","although"];
  const foundGood=goodWords.filter(w=>a.toLowerCase().includes(w));
  if(foundGood.length>0) strengths.push(`Great vocabulary choice — using '${foundGood[0]}' is impressive at this level!`);

  // Build feedback
  let fb="";
  fb+=strengths[0]||"Good effort!";
  if(checks.length>0) fb+=" "+checks[0];
  else fb+=" Your grammar looks good — keep it up!";
  if(strengths.length>1) fb+=" "+strengths[1];
  else if(words<15) fb+=" Try to speak for a little longer next time to practise more.";

  window._feedback=fb;
  renderActionPanel();
  const el=document.getElementById('fb-text');
  if(el) el.textContent=window._feedback;
}

// Stars
(function(){
  const s=document.getElementById('stars');
  const colors=["#fde68a","#f0abfc","#a5f3fc","#bbf7d0","#fff"];
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    d.className='star';
    d.style.cssText=`left:${(i*41+7)%100}%;top:${(i*59+11)%100}%;width:${i%4===0?7:4}px;height:${i%4===0?7:4}px;background:${colors[i%5]};animation-duration:${2+(i%3)}s;animation-delay:${i*0.25}s`;
    s.appendChild(d);
  }
})();

renderHome();
</script>
